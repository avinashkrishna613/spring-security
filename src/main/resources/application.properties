spring.application.name=security
server.port=8000

# H2 Database Configuration in embedded mode-->
spring.jpa.database=h2
spring.datasource.url=jdbc:h2:mem:securitydb
#spring.datasource.url=jdbc:h2:file:./data/securitydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-db

# port for Spring Boot Actuator endpoints
management.server.port=8001

# Debug logging
logging.level.org.springframework.boot.autoconfigure=DEBUG

# create tables on startup and drop them on shutdown
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# have hibernate generate the DDL and export it to a file
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=drop-and-create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=create.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.drop-target=drop.sql

# jwt secret key
jwt.secret=143143143567143143143567143143143567143143143567
jwt.expiration = 3600000
